<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lyrics English</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--bg:#07111f;--panel:rgba(11,18,32,.88);--line:rgba(255,255,255,.13);--text:#f8fafc;--muted:#aab4c4;--gold:#e6c374;--blue:#71b7ff;--red:#fb7185;--green:#35d399}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 25% 5%,rgba(113,183,255,.20),transparent 30%),radial-gradient(circle at 80% 0%,rgba(230,195,116,.18),transparent 25%),linear-gradient(135deg,#07111f,#0a1424)}
    button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}a{color:inherit}
    .app{max-width:1080px;margin:0 auto;padding:18px 16px 98px}.hidden{display:none!important}.screen{display:none}.screen.active{display:block}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--blue));color:#07111f;font-weight:900;display:grid;place-items:center}.brand h1{margin:0;font-size:22px}.brand p{margin:2px 0;color:var(--muted)}
    .card,.hero{background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:24px;margin-bottom:16px;box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px)}.hero h2{font-size:42px;line-height:1.15;margin:0 0 12px}.muted,.mini{color:var(--muted)}.mini{font-size:13px;line-height:1.7}
    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:14px 18px;font-weight:850;background:linear-gradient(135deg,#e6c374,#f4d98e);color:#0b1220;text-decoration:none;min-height:50px}.btn.secondary{background:rgba(255,255,255,.10);color:var(--text);border:1px solid var(--line)}.btn.blue{background:linear-gradient(135deg,#71b7ff,#9dccff);color:#07111f}.btn.red{background:rgba(251,113,133,.16);color:#fecdd3;border:1px solid rgba(251,113,133,.35)}.btn.green{background:rgba(53,211,153,.18);color:#bbf7d0;border:1px solid rgba(53,211,153,.35)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.field{margin:0 0 14px}label{display:block;margin:0 0 7px;color:#d9e1ee;font-weight:800;font-size:13px}input,textarea,select{width:100%;border:1px solid var(--line);background:#070d1b;color:var(--text);border-radius:18px;padding:15px 16px;outline:none}textarea{min-height:160px;line-height:1.65;resize:vertical}
    .login{min-height:100vh;display:grid;place-items:center;padding:18px}.login-card{width:min(420px,100%);background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:26px}.login-card .btn{width:100%}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:16px}.song-item{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:22px;padding:16px;margin-bottom:10px}.song-item h4{margin:0 0 6px}.tag{display:inline-flex;border:1px solid rgba(230,195,116,.35);background:rgba(230,195,116,.14);color:#ffe9a8;border-radius:999px;padding:5px 9px;font-size:12px;margin:4px 4px 0 0}
    .lyrics-line{border:1px solid var(--line);background:rgba(255,255,255,.07);border-radius:24px;padding:18px;margin-bottom:14px}.lyrics-line .en{font-size:20px;font-weight:900;margin-bottom:10px;line-height:1.65}.word{display:inline-block;padding:2px 4px;margin:1px;border-radius:8px;cursor:pointer}.word:hover{background:rgba(230,195,116,.22);color:#ffe9a8}.lyrics-line .jp{color:#ffe9a8;margin-bottom:12px;line-height:1.7;font-weight:700}details{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}summary{font-weight:900;color:#dbeafe;cursor:pointer}
    .tabbar{position:fixed;left:14px;right:14px;bottom:14px;max-width:720px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px;background:rgba(7,17,31,.88);border:1px solid var(--line);border-radius:24px;backdrop-filter:blur(20px);z-index:20}.tabbar button{background:transparent;color:var(--muted);border-radius:16px;padding:12px 6px;font-weight:900;font-size:12px}.tabbar button.active{background:rgba(230,195,116,.18);color:#ffe9a8}
    .toast{display:none;position:fixed;top:16px;left:16px;right:16px;max-width:520px;margin:auto;background:#111827;border:1px solid var(--line);border-radius:18px;padding:14px 16px;z-index:99}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;align-items:flex-end}.sheet{width:100%;max-width:560px;margin:0 auto;background:#0b1220;border:1px solid var(--line);border-radius:28px 28px 0 0;padding:22px;box-shadow:0 -18px 60px rgba(0,0,0,.45)}
    .print-area{background:white;color:#111;padding:28px;border-radius:18px}.vocab-row{border-bottom:1px solid #ddd;padding:10px 0}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:760px){.grid,.two{grid-template-columns:1fr}.hero h2{font-size:32px}.app{padding-top:14px}.card,.hero{padding:20px;border-radius:24px}.song-item{display:block}.song-item .actions{margin-top:12px}.actions .btn{flex:1}}
    @media print{.top,.tabbar,.no-print,.screen:not(.active),.modal{display:none!important}body{background:white;color:#111}.app{padding:0}.card{box-shadow:none;border:0;background:white;color:#111}@page{size:A4;margin:14mm}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <div class="login-card">
      <div class="brand" style="margin-bottom:18px"><div class="logo">LE</div><div><h1>Lyrics English</h1><p>Supabase共有版</p></div></div>
      <p class="mini">ユーザーIDと共通パスワードでログイン。</p>
      <div class="field"><label>ユーザーID</label><input id="loginId" value="kazuki"></div>
      <div class="field"><label>パスワード</label><input id="loginPw" type="password" value="12345"></div>
      <button class="btn" id="loginBtn">ログイン</button>
    </div>
  </div>

  <div id="main" class="app hidden">
    <div class="top">
      <div class="brand"><div class="logo">LE</div><div><h1>Lyrics English</h1><p id="userLabel"></p></div></div>
      <button class="btn secondary" id="logoutBtn">ログアウト</button>
    </div>

    <section id="home" class="screen active">
      <div class="hero">
        <h2>2人で蓄積する、洋楽英語ライブラリ。</h2>
        <p class="muted">YouTubeリンク、歌詞、和訳、文法、単語帳を共有。Kazuki/ShunどちらのiPhoneからでも同じデータを見られます。</p>
        <div class="actions"><button class="btn" data-screen="add">＋ 曲を追加</button><button class="btn secondary" data-screen="vocab">単語帳</button></div>
      </div>
      <div class="grid">
        <div class="card"><h3>共有ライブラリ</h3><p class="mini" id="libraryStats">読み込み中...</p><div id="songList"></div></div>
        <div><div class="card"><h3>リアルタイム更新</h3><p class="mini" id="realtimeLog">変更待機中...</p></div><div class="card"><h3>接続状態</h3><p class="mini" id="connectionStatus">確認中...</p></div></div>
      </div>
    </section>

    <section id="songs" class="screen"><div class="card"><h3>曲一覧</h3><input id="search" placeholder="曲名・アーティストで検索"></div><div id="songList2"></div></section>
    <section id="detail" class="screen"><div id="songDetail"></div></section>

    <section id="add" class="screen">
      <div class="card">
        <h3 id="formTitle">曲を追加</h3><input type="hidden" id="editId">
        <div class="field"><label>YouTube URL</label><input id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..."></div>
        <div class="actions" style="margin-bottom:16px"><button class="btn blue" id="youtubeBtn">YouTubeリンクから曲情報を推定</button></div>
        <div class="field"><label>曲名</label><input id="songTitle" placeholder="Shape of You"></div>
        <div class="field"><label>アーティスト名</label><input id="artistName" placeholder="Ed Sheeran"></div>
        <div class="field"><label>Apple Music URL</label><input id="appleUrl" placeholder="https://music.apple.com/..."></div>
        <div class="two"><div class="field"><label>ジャンル</label><input id="genre" placeholder="Pop"></div><div class="field"><label>難易度</label><select id="difficulty"><option>初級</option><option>中級</option><option>上級</option></select></div></div>
        <div class="field"><label>アーティストプロフィール</label><textarea id="artistProfile"></textarea></div>
        <div class="field"><label>歌詞全文</label><textarea id="lyricsRaw" style="min-height:220px" placeholder="歌詞を全文コピペ"></textarea></div>
        <div class="actions"><button class="btn" id="analyzeBtn">AI分析する</button><button class="btn secondary" id="saveBtn">保存</button><button class="btn red" id="clearBtn">クリア</button></div>
      </div>
      <div class="card"><h3>分析プレビュー</h3><div id="analysisPreview" class="mini">歌詞を貼り付けて「AI分析する」を押してください。</div></div>
    </section>

    <section id="vocab" class="screen">
      <div class="card no-print"><h3>単語帳</h3><div class="actions"><button class="btn" id="printViewBtn">A4 PDF用表示</button><button class="btn secondary" id="printBtn">印刷 / PDF保存</button></div></div>
      <div class="card" id="vocabView"></div>
    </section>

    <div class="tabbar no-print">
      <button data-screen="home" class="active">Home</button>
      <button data-screen="songs">Songs</button>
      <button data-screen="add">Add</button>
      <button data-screen="vocab">Vocab</button>
    </div>
  </div>

  <div id="wordModal" class="modal">
    <div class="sheet">
      <h3 id="modalWord">word</h3>
      <p class="mini" id="modalInfo"></p>
      <div class="field"><label>意味</label><input id="modalMeaning"></div>
      <div class="field"><label>品詞</label><input id="modalPos"></div>
      <div class="field"><label>メモ</label><textarea id="modalMemo" style="min-height:90px"></textarea></div>
      <div class="actions"><button class="btn" id="modalAddBtn">単語帳に追加</button><button class="btn secondary" id="modalCloseBtn">閉じる</button></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
